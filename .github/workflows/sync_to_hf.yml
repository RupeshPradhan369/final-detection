name: Sync Backend to HuggingFace Space

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  sync-to-huggingface:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
          persist-credentials: false

      - name: Push backend to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "sync@github.com"
          git config --global user.name "GitHub Sync"
          git clone https://dante369killer:$HF_TOKEN@huggingface.co/spaces/dante369killer/fake-news-detector-backend hf_space
          cp -r backend/detector hf_space/
          cp -r backend/core hf_space/
          cp backend/manage.py hf_space/
          cp backend/Dockerfile hf_space/
          cp requirements.txt hf_space/
          cd hf_space
          git add .
          git diff --cached --quiet || git commit -m "Auto-sync from GitHub ${{ github.sha }}"
          git push